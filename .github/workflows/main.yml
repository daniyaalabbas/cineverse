name: CineVerse CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Test Flask Application
        run: python -c "import app; print('CineVerse Loaded Successfully')"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: docker build -t daniyaalabbas/cineverse:latest .

      - name: Push Docker Image
        run: docker push daniyaalabbas/cineverse:latest

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f deployment.yml
          kubectl rollout restart deployment cineverse
          kubectl rollout status deployment cineverse
